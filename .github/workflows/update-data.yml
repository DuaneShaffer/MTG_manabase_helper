name: Weekly data refresh

on:
  schedule:
    # Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # build_data validates the snapshot (count floors, key checks) and exits
      # non-zero without writing anything if the data looks wrong.
      - name: Build data from Scryfall
        run: python scripts/build_data.py

      # Freshly built data must not ship if the test suites fail.
      - name: Run Python tests
        run: python -m pytest tests/ -q

      - name: Run JS tests
        run: |
          for f in docs/js/tests/*.test.js; do node "$f"; done

      # Fresh data must not ship if it breaks the recommender on real meta
      # decks. Fixture decks the new data no longer knows (rotation) are
      # skipped with a warning, not failed — refresh tests/fixtures then.
      - name: Run manabase validators
        run: |
          node scripts/validate_against_meta.mjs
          node scripts/validate_recommender.mjs

      - name: Commit and push refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if ! git diff --cached --quiet; then
            git commit -m "chore: weekly Scryfall data refresh [skip ci]"
            git push
          fi
