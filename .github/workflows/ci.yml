name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest tests/ -q

      - name: Run JS tests
        run: |
          for f in docs/js/tests/*.test.js; do node "$f"; done

      # Fixture-deck validators (scripts/*.mjs): gate the recommender and the
      # land-count math against real meta decks. Decks that rotated out of
      # docs/data are skipped with a warning, so a data refresh can't hard-fail
      # this step; genuine logic/perf regressions do fail it.
      - name: Run manabase validators
        run: |
          node scripts/validate_against_meta.mjs
          node scripts/validate_recommender.mjs
